format_version: 10

# ─── GoCD CD 파이프라인 ─────────────────────────────────────────────────────────
# 흐름: git push → test → build & push → update-manifest
#   → ArgoCD가 k8s/deployment.yaml 변경을 감지해 클러스터에 배포
#
# ※ GITHUB_TOKEN은 GoCD UI에서 보안 환경변수로 설정 필요:
#   Admin > Pipelines > sample-app > Environment Variables > Secure Variables

pipelines:
  sample-app:
    group: default
    label_template: "${COUNT}-${git[:7]}"   # 파이프라인 레이블: 빌드번호-SHA7자리

    # ── Materials: 변경 감지 소스 ─────────────────────────────────────────────
    materials:
      git:
        git: https://github.com/jiyongham/first-repository.git
        branch: main
        auto_update: true
        destination: src
        filter:
          ignore:
            - "k8s/**"         # 매니페스트 봇 커밋 → 파이프라인 재트리거 방지
            - ".github/**"
            - "gocd/**"
            - ".gocd/**"

    # ── 공통 환경변수 ─────────────────────────────────────────────────────────
    environment_variables:
      REGISTRY: ghcr.io
      IMAGE_NAME: jiyongham/sample-app
      GITHUB_USER: jiyongham
    # GITHUB_TOKEN 은 GoCD UI에서 보안 변수로 추가
    # (Admin > Pipelines > sample-app > Environment Variables > Secure)

    # ── Stages ────────────────────────────────────────────────────────────────
    stages:

      # Stage 1: 단위 테스트
      - test:
          approval:
            type: success       # 이전 스테이지 성공 시 자동 실행
          jobs:
            unit-test:
              resources:
                - go             # go 리소스가 있는 Agent만 실행
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        set -e
                        cd src/sample-app
                        echo "==> Go 테스트 실행"
                        go test -v ./...
                        echo "==> 테스트 통과!"

      # Stage 2: Docker 이미지 빌드 & GHCR 푸시
      - build-and-push:
          approval:
            type: success
          jobs:
            docker:
              resources:
                - docker         # docker 리소스가 있는 Agent만 실행
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        set -e
                        cd src
                        SHORT_SHA=$(git rev-parse --short HEAD)
                        echo "==> 빌드 태그: ${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

                        ## GHCR 로그인
                        echo "${GITHUB_TOKEN}" | docker login "${REGISTRY}" \
                          -u "${GITHUB_USER}" --password-stdin

                        ## 멀티스테이지 빌드 (SHA를 버전으로 주입)
                        docker build \
                          --build-arg "VERSION=${SHORT_SHA}" \
                          -t "${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}" \
                          -t "${REGISTRY}/${IMAGE_NAME}:latest" \
                          ./sample-app

                        ## SHA 태그 + latest 푸시
                        docker push "${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
                        docker push "${REGISTRY}/${IMAGE_NAME}:latest"
                        echo "==> 이미지 푸시 완료: ${SHORT_SHA}"

      # Stage 3: K8s 매니페스트 업데이트 → ArgoCD가 나머지를 처리
      - update-manifest:
          approval:
            type: success
          jobs:
            git-push:
              resources:
                - go
              tasks:
                - exec:
                    command: /bin/sh
                    arguments:
                      - -c
                      - |
                        set -e
                        cd src
                        SHORT_SHA=$(git rev-parse --short HEAD)
                        echo "==> 매니페스트 업데이트: ${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"

                        ## deployment.yaml 이미지 태그 교체
                        sed -i \
                          "s|image: ghcr.io/jiyongham/sample-app:.*|image: ${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}|" \
                          k8s/deployment.yaml

                        git config user.email "gocd@practice.local"
                        git config user.name "GoCD Agent"
                        git add k8s/deployment.yaml

                        ## 변경사항 없으면 빈 커밋 방지
                        if git diff --staged --quiet; then
                          echo "변경사항 없음. 건너뜀."
                          exit 0
                        fi

                        git commit -m "ci(gocd): update image to ${SHORT_SHA}"
                        git push \
                          "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/jiyongham/first-repository.git" \
                          HEAD:main
                        echo "==> 매니페스트 커밋 및 푸시 완료!"
                        echo "    ArgoCD가 변경을 감지해 자동 배포합니다."
